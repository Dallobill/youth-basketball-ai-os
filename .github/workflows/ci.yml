name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Root lint
        run: npm run lint

      - name: Root format check
        run: npm run format:check

      - name: Root tests
        run: npm run test

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend format check
        run: npm run format:check
        working-directory: frontend

      - name: Frontend tests
        run: npm run test
        working-directory: frontend
